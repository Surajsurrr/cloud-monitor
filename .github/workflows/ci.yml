name: Cloud Monitor CI/CD Pipeline

# Trigger conditions
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # Allow manual trigger

# Environment variables
env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cloud-monitor

jobs:
  # =========================================================================
  # JOB 1: CODE QUALITY & TESTING
  # =========================================================================
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      
      # Step 4: Run tests with coverage
      - name: Run Tests
        run: npm test
        continue-on-error: false
      
      # Step 5: Validate build
      - name: Validate Build
        run: npm run build
        continue-on-error: true

  # =========================================================================
  # JOB 2: DOCKER BUILD & PUSH
  # =========================================================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    permissions:
      contents: read
      packages: write
    
    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Step 2: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          buildkitd-flags: --allow-insecure-entitlement security.insecure
      
      # Step 3: Login to Container Registry (if applicable)
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      # Step 4: Extract metadata
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      # Step 5: Build Docker image
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: cloud-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Step 6: Test Docker image
      - name: Test Docker Image
        run: |
          docker run --rm -d \
            --name cloud-monitor-test \
            -p 3000:3000 \
            cloud-monitor:test
          
          sleep 2
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/v1/health)
          echo "Health check response: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed!"
            docker logs cloud-monitor-test
            docker stop cloud-monitor-test
            exit 1
          fi
          
          docker stop cloud-monitor-test
          echo "Docker image test passed!"
      
      # Step 7: Push to registry (only on main branch)
      - name: Push Docker Image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # JOB 3: DEPLOYMENT CHECK (Optional)
  # =========================================================================
  deploy-check:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Check Deployment Files
        run: |
          echo "Checking deployment configuration..."
          ls -la Dockerfile
          ls -la docker-compose.yml
          ls -la README.md
          echo "All deployment files present!"
      
      - name: Generate deployment summary
        run: |
          echo "# Deployment Ready ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build: SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "- Ready for production deployment" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # JOB 4: NOTIFY ON COMPLETION
  # =========================================================================
  notify:
    name: Workflow Notification
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: always()
    
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || [ "${{ needs.docker.result }}" = "failure" ]; then
            echo "status=FAILED ❌" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED ✅" >> $GITHUB_OUTPUT
            echo "color=green" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Workflow Summary
        run: |
          echo "# CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status: ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Jobs Summary:" >> $GITHUB_STEP_SUMMARY
          echo "- **Testing**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker**: ${{ needs.docker.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "### Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
